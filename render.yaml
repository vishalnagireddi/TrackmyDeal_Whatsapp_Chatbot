services:
  - type: web
    name: trackmydeal
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGO_URI
        sync: false
      - key: META_WHATSAPP_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_VERIFY_TOKEN
        value: "trackmydeal_verify"
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: trackmydeal
          type: web
          property: host
